<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up | Mabok MatchA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="index.html">
                Mabok MatchA
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="produk.html">Produk</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="signin.html">Sign In</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="signup.html">
                            Sign Up
                        </a>

                </ul>

            </div>

        </div>

    </nav>

    <section class="hero text-center">

        <div class="container">

            <h1>Join The MatchA Vibes</h1>

            <p class="lead">
                Jadi bagian dari komunitas matcha paling chill 🍵🔥
            </p>

        </div>

    </section>

    <main class="container my-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg p-4 form-card">

                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Masukkan username">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Masukkan email">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Masukkan password">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Konfirmasi password">

                        </div>

                        <button class="btn btn-success w-100">
                            Sign Up
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>

    <footer class="text-center p-3">

        <p>
            © 2026 Mabok MatchA Website
        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
